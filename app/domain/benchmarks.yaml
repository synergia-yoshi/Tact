    rows:
      - { media: google_search, device: all, funnel_stage: intent, ctr: 0.0227, cpc: 93,  install_rate: 0.0544, cpi: 1706, cvr: 0.0585, cpa: 29188, n: 1, confidence: 0.35 }
      - { media: yahoo_search,  device: all, funnel_stage: intent, ctr: 0.0109, cpc: 59,  install_rate: 0.0346, cpi: 1702, cvr: 0.0576, cpa: 29545, n: 1, confidence: 0.35 }
      - { media: facebook,      device: all, funnel_stage: semi_intent, ctr: 0.0078, cpc: 161, install_rate: 0.1329, cpi: 1210, cvr: 0.0461, cpa: 26246, n: 1, confidence: 0.35 }
      - { media: twitter,       device: all, funnel_stage: latent, ctr: 0.0044, cpc: 93,  install_rate: 0.0809, cpi: 1152, cvr: 0.0350, cpa: 32911, n: 1, confidence: 0.35 }
      - { media: yahoo_infeed,  device: all, funnel_stage: latent, ctr: 0.0009, cpc: 50,  install_rate: 0.0445, cpi: 1124, cvr: 0.0430, cpa: 26123, n: 1, confidence: 0.35 }
      - { media: smartnews,     device: all, funnel_stage: latent, ctr: 0.0053, cpc: 27,  install_rate: 0.0215, cpi: 1263, cvr: 0.0430, cpa: 29399, n: 1, confidence: 0.35 }
      - { media: gdn,           device: all, funnel_stage: semi_intent, ctr: 0.0036, cpc: 56, install_rate: 0.0320, cpi: 1762, cvr: 0.0450, cpa: 39158, n: 1, confidence: 0.35 }
      - { media: facebook_dpa,  device: all, funnel_stage: retargeting, ctr: 0.0521, cpc: 68, cvr: 0.0066, cpa: 10341, n: 1, confidence: 0.35, note: "リタゲ最安・install別計上" }
    notes: "ニュース系はCPC激安/install率低、FBは高CPC/高install率。iOS/AndroidでCPI差。出所のGunosy行はdefunctのため除外。"

  # --- 3. 証券・ネット証券（SBI証券/FullSpeed, 2015, sim＋要件） --------------
  - industry: finance_securities
    source: { file: "【SBI証券様】リスティング広告プラン Final.pptx", year: 2015, type: sim }
