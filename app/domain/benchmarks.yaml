# ============================================================================
# benchmarks.yaml — Tact engine 前提SSoT（シード版）
# Target repo path: app/domain/benchmarks.yaml （現在リポはmount外。Codexがこれを基に配置）
# ----------------------------------------------------------------------------
# 不可侵原則（見た目＞実体にしない）に従い、全数値に source / year / type / data_kind / 確信度 を付す。
# これは「オーナー確認前のテスト用シード」。断定値ではない。実データ(GA4/各媒体API)接続後に上書きする。
# 出所の一次抽出は vault: 40_Resources/marketing-knowledge/benchmark-seeds.md
# ============================================================================

meta:
  version: "0.1.0-seed"
  generated: "2026-06-30"
  data_kind_default: "industry_seed"   # 業界ベンチ＝テスト用シード（個社実測ではない）
  policy:
    - "actual(実績)は強い事前分布、sim(代理店試算)は弱い事前分布として確信度を下げる。"
    - "値は点推定で使わず、95%予言区間の中心＋幅(sd,n)で扱う。"
    - "古い試算(2014-15)は staleness で区間を広げる。実測が貯まればベイズ更新で上書き。"
    - "ベンチの無い industry は generic_fallback＋広い区間でフォールバックし、その旨を明示。"
    - "現存しない媒体(defunct_media)は現行の媒体選択肢に出さない。古い実績は構造傾向の参考のみ＝現行媒体に読み替える。"
  defunct_media: [mediaforge, vizury, gunosy]   # 出所資料に登場するが現存しない／広告媒体として扱わない（現行UIに出さない）

# ---- 列挙（実装側のenum想定） -------------------------------------------------
conventions:
  industries: [real_estate_rental, real_estate_sale, finance_securities, bridal,
               education_school, recruiting, ec_photobook, btob_saas, app_install_automotive, ec_generic]
  media: [google_search, yahoo_search, gdn, ydn, yahoo_infeed, facebook, facebook_dpa,
          twitter, smartnews, youtube, gumgum, dsp, retargeting, seo]
  devices: [pc, sp, tv, tablet, all]
  funnel_stages: [latent, semi_intent, intent, nomination, retargeting]   # 潜在/準顕在/顕在/指名/リタゲ
  metrics: [cpm, ctr, cpc, cvr, cpa, cpi, install_rate, aov]              # aov=客単価

# ---- 確信度モデル（実装ヒント） -----------------------------------------------
confidence_model:
  by_type: { actual: 0.7, sim: 0.4 }          # 起点。n と staleness で調整。
  staleness_halflife_years: 5                  # 経過年で確信度を半減（区間を広げる）
  note: "sd/n が無いシードは confidence から区間幅を逆算（低確信度=広い区間）。旧固定信頼度は使わない。"

# ============================================================================
# 業種別ベンチ（industry × media × device × funnel_stage）
# 各 entry: metrics{...} + source{file,year,type} + n + (sd) + confidence
# ============================================================================
benchmarks:

  # --- 1. 賃貸・不動産ポータル（じげん, 2014, sim） ---------------------------
  - industry: real_estate_rental
    source: { file: "じげん 御中 配信シミュレーション資料.pdf", year: 2014, type: sim }
    aggregate: { ctr: 0.0019, cpc: 70, cvr: 0.0143, cpa: 4865 }
    rows:
      - { media: google_search, device: pc, funnel_stage: intent, ctr: 0.0230, cpc: 91,  cvr: 0.0094, cpa: 9724,  n: 1, confidence: 0.35 }
      - { media: google_search, device: sp, funnel_stage: intent, ctr: 0.0470, cpc: 100, cvr: 0.0150, cpa: 6659,  n: 1, confidence: 0.35 }
      - { media: gdn,           device: pc, funnel_stage: semi_intent, ctr: 0.0016, cpc: 83, cvr: 0.0134, cpa: 6220, n: 1, confidence: 0.35 }
      - { media: gdn,           device: sp, funnel_stage: semi_intent, ctr: 0.0017, cpc: 61, cvr: 0.0095, cpa: 6355, n: 1, confidence: 0.35 }
      - { media: yahoo_search,  device: pc, funnel_stage: intent, ctr: 0.0130, cpc: 93,  cvr: 0.0079, cpa: 11670, n: 1, confidence: 0.35 }
      - { media: yahoo_search,  device: sp, funnel_stage: intent, ctr: 0.0245, cpc: 101, cvr: 0.0145, cpa: 6976,  n: 1, confidence: 0.35 }
      # ↓ 出所はMediaForge/Vizury（いずれも現存しない媒体）。媒体名は採用せず、リタゲ=CPA最安の構造係数としてのみ保持。
      - { media: retargeting,   device: pc,  funnel_stage: retargeting, ctr: 0.0018, cpc: 145, cvr: 0.0509, cpa: 2845, n: 1, confidence: 0.25, source_vendor_defunct: true }
      - { media: retargeting,   device: all, funnel_stage: retargeting, ctr: 0.0010, cpc: 34,  cvr: 0.0152, cpa: 2262, n: 1, confidence: 0.25, source_vendor_defunct: true }
    notes: "指名系KWはCTR14-16%/CVR2%超で別格。リタゲがCPA最安（出所媒体MediaForge/Vizuryは現存せず＝構造傾向の参考のみ、現行はGoogle/Meta等のリタゲに読み替え）。"

  # --- 2. 自動車メディア・アプリ獲得（カーセンサー/Recruit, sim） --------------
