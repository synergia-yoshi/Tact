    rows:
      - { media: google_search, device: all, funnel_stage: intent, segment: standard, ctr: 0.0014, cpc: 111, cvr: 0.0375, cpa: 2951, n: 1, confidence: 0.35 }
      - { media: google_search, device: all, funnel_stage: intent, segment: nisa,     ctr: 0.0008, cpc: 158, cvr: 0.0207, cpa: 7606, n: 1, confidence: 0.35 }
    notes: "高CPC帯。指名=低CPA青天井、BIG=高CPC独立制御。RLSA+動的検索で刈り取り拡張。"

  # --- 4. ブライダル（ぐるなびWEDDING/FullSpeed, 2014, actual＋sim） ----------
  - industry: bridal
    source: { file: "ぐるなびWEDDING 冬の需要期プロモーションプラン.pptx", year: 2014, type: actual }
    rows:
      - { media: yahoo_search, device: pc, funnel_stage: intent, segment: bridal_fair, cpa: 18825, cpa_prev: 7527, n: 1, confidence: 0.45, note: "前年比でCPA悪化(actual)" }
      - { media: yahoo_search, device: sp, funnel_stage: intent, segment: bridal_fair, cpc: 489, cpc_prev: 153, cpa: 31715, cpa_prev: 10538, cvr: 0.005, n: 1, confidence: 0.45, note: "SP CPC約3倍(actual)。順位低下でCTR崖落ち" }
    notes: "SPは1-2位入札必須。CVR0.9%超で同予算CV倍。CPC¥100切りは困難。季節係数あり。"

  # --- 5. 教育・専門学校（辻調理師専門学校/amana, 2023, actual＋sim）★新しい --
  - industry: education_school
