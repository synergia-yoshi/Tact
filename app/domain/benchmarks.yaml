      - { media: gumgum,  device: all, funnel_stage: latent, cpm: 1500, ctr: 0.0115, cpc: 131, view_through_rate: 0.6551, cpv: 3.2, n: 1, confidence: 0.55 }
      - { media: youtube, device: tv, funnel_stage: latent, cpm: 688, ctr: 0.0001, view_through_rate: 0.5596, cpv: 1.23, n: 1, confidence: 0.55, note: "TV=リーチ効率/高完全視聴" }
      - { media: youtube, device: sp, funnel_stage: latent, cpm: 864, ctr: 0.0031, view_through_rate: 0.3831, cpv: 2.26, n: 1, confidence: 0.55, note: "SP=誘導(CTR高)" }
    notes: "媒体simは保守的に外す(CPV sim¥5.3→実績¥1.8)＝simは弱い事前分布の根拠。"

  # --- 6. 採用・人材（ラクス第二新卒/FullSpeed, 2014, sim） -------------------
  - industry: recruiting
    source: { file: "ラクス 御中 プロモーションのご提案.pdf", year: 2014, type: sim }
    aggregate: { ctr: 0.0003, cpc: 109, cvr: 0.0055, cpa: 19873 }
    rows:
      - { media: dsp,          device: all, funnel_stage: latent,      ctr: 0.0005, cpc: 230, cvr: 0.0050, cpa: 45957, n: 1, confidence: 0.35, note: "Sphere発掘" }
      - { media: yahoo_search, device: all, funnel_stage: retargeting, ctr: 0.0005, cpc: 68,  cvr: 0.0130, cpa: 5263,  n: 1, confidence: 0.35 }
      - { media: google_search,device: all, funnel_stage: retargeting, ctr: 0.0010, cpc: 103, cvr: 0.0145, cpa: 7143,  n: 1, confidence: 0.35 }
      - { media: ydn,          device: all, funnel_stage: latent,      ctr: 0.0001, cpc: 14,  cvr: 0.0003, cpa: 50000, n: 1, confidence: 0.35, note: "ブロード発掘" }
    notes: "発掘は高CPA・刈り取りは低CPA＝ファネル段階×CPA勾配の実例。"

  # --- 7. 分譲不動産ファネル（構造理解, sim）★エンジン構造の生きた例 ----------
  - industry: real_estate_sale
    source: { file: "構造理解（棟名×一般KW ファネル試算）", year: null, type: sim }
