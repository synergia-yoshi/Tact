    benchmarks_general: { btob_site_cvr: "0.01-0.02", form_completion_ideal: 0.20 }

  # --- 10. EC（自然検索）月別CVR（ECサイトトレンド, 2019-22, actual） ---------
  - industry: ec_generic
    source: { file: "ECサイトトレンド（G-Organic CVR推移）", year: "2019-2022", type: actual }
    channel: organic
    monthly_cvr_avg:   # 19-20年度平均CVR（比率）
