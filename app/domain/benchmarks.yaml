# ============================================================================
# 構造係数（業種横断の事前分布）— アロケの方向性に効く
# ============================================================================
structural_priors:
  retargeting_cheapest:
    rule: "リタゲ(deep/DPA/RLSA)はファネル下部で全業種CPA最安。アロケは下部から埋める。"
    evidence: [real_estate_rental, app_install_automotive, recruiting, real_estate_sale]
  funnel_cvr_gradient:
    rule: "CVRは latent < semi_intent < intent < nomination の順で上昇、CPAは逆に低下。"
    nomination_premium: "指名系KWはCTR/CVRが非指名の数倍(SBI,じげん)。"
  media_profiles:
    facebook:  { cpc: high, install_or_engage_rate: high }
    news_feed: { media: [smartnews], cpc: very_low, cv_rate: low, note: "Gunosyは現存せず除外。ニュース系の傾向としてのみ保持。" }
    video_tv:  { role: reach, view_through_rate: high }
    video_sp:  { role: traffic, ctr: high }
  sim_vs_actual:
    rule: "媒体sim/提案試算は保守的に外れる。actualで上書きするまで弱い事前分布として扱う。"

# ============================================================================
# パイプライン・モデル（BtoB/リードgen向け：リード→商談→受注）
# 出典：才流 ネットプロテクションズ(actual,2022)
# ============================================================================
pipeline_model:
  stages: [session, form, lead, deal, win]
  rates:
    lead_to_deal: { low: 0.25, high: 0.30, type: actual, confidence: 0.55 }
    deal_to_win:  { point: 0.20, type: actual, confidence: 0.55 }
    cvr_decomposition: "CVR = transition_rate * completion_rate（フォーム遷移率×完了率）"
  cv_point_to_deal:
    inquiry: { low: 0.60, high: 0.80 }
    doc_request: 0.30
  awareness_payback:
    rule: "認知施策なしは顕在のみ刈り取りで途中からCPA高騰。認知ありは初期CPA高いが長期CAC逓減。"
    use: "回収期間(Payback Period)付きで提示。短期CPA悪化と長期改善を分けて表示。"
  page_level_cvr_causality:    # ナビ露出の取捨選択（観察的因果, actual）
    positive: [{ page: price, lift: 2.06 }, { page: merit, lift: 1.71 }, { page: function, lift: 1.51 }]
    negative: [{ page: case, lift: 0.16 }, { page: news, lift: 0.31 }]
    caveat: "観察データの交絡に注意。確信度併記、可能ならA/Bで確認。"

# ============================================================================
# 季節係数（月次）— アロケの時間軸
# 出典：ECサイトトレンド(actual)。CVRに連動した予算配分比率。
# ============================================================================
seasonality:
  ec_generic_organic:
    source: { file: "ECサイトトレンド", year: "2019-2022", type: actual }
    rule: "CVRが高い月に厚く張る（CVR連動配分）。業種で季節パターンは差し替え。"
    budget_allocation_ratio:   # 年間予算を月配分（合計≒100%）
      "1": 0.0830
      "2": 0.0745
      "3": 0.0651
      "4": 0.0892
      "5": 0.1018
      "6": 0.1016
      "7": 0.1128
      "8": 0.0755
      "9": 0.1018
      "10": 0.0832
      "11": 0.0637
      "12": 0.0476
  bridal:
    rule: "冬の需要期(11-1月)に向けCPC上昇・CVR変動。季節プロモと連動。"
    source: { file: "ぐるなびWEDDING", year: 2014, type: actual }

# ============================================================================
# フォールバック
# ============================================================================
generic_fallback:
  rule: "該当industryのベンチが無い場合、最も近いindustry＋generic値を使い、確信度を下げ区間を広げる。必ず『汎用ベンチで推定』と明示。"

