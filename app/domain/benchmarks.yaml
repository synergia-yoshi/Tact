      - { media: facebook,     device: all, funnel_stage: latent,      ctr: 0.0100, cpc: 350, cvr: 0.0006,  cpa: 583333, n: 1, confidence: 0.30, note: "職業ターゲ" }
      - { media: facebook,     device: all, funnel_stage: semi_intent, ctr: 0.0080, cpc: 200, cvr: 0.0012,  cpa: 166667, n: 1, confidence: 0.30, note: "CV類似" }
      - { media: gdn,          device: all, funnel_stage: intent,      ctr: 0.0150, cpc: 90,  cvr: 0.00225, cpa: 40000,  n: 1, confidence: 0.30, note: "リタゲ深" }
      - { media: google_search,device: all, funnel_stage: intent,      ctr: 0.0250, cpc: 300, cvr: 0.00225, cpa: 133333, n: 1, confidence: 0.30 }
      - { media: seo,          device: all, funnel_stage: intent,      ctr: 0.0100, cpc: 0,   cvr: 0.0020,  cpa: 0,      n: 1, confidence: 0.30, note: "無料インベントリ" }
    scenario_example:
      base:      { total_cvr: 0.00101, monthly_cv: 10, avg_cpa: 102086, budget: 1000000 }
      suumo_cvr: { total_cvr: 0.00284, monthly_cv: 27, avg_cpa: 36276,  budget: 1000000 }
