name: Hermes Digest (manual only)

on:
  # Scheduled Hermes delivery is paused.
  # Daily/weekly/monthly intelligence delivery is handled by Codex Automations instead,
  # so this workflow is retained only for explicit manual runs while the legacy bot exists.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
      ANTHROPIC_MODEL: claude-opus-4-8
      HERMES_DAILY_API_BUDGET_USD: "1.50"
      MAX_CANDIDATES_PER_RUN: "40"
      MAX_DELIVERIES_PER_RUN: "4"
      TTP_SCORE_THRESHOLD: "15"
      LLM_BATCH_SIZE: "8"
      MAX_BODY_CHARS_PER_CANDIDATE: "3000"
      ENABLE_PRODUCT_HUNT_GRAPHQL: "true"
      ENABLE_GITHUB_TRENDING: "false"
      ENABLE_REDDIT: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm start

      - name: Commit Hermes seen state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --cached --quiet || git commit -m "chore: update Hermes seen state"
          git push
